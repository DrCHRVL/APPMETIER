# SIRAL — déploiement serveur (app + HTTPS automatique + mises à jour in-app)
#
#  1. copiez .env.exemple vers .env et remplissez les valeurs
#  2. docker compose up -d --build
#
# Nom de projet : dérivé du dossier (« siral » si /opt/siral ou ~/siral), donc
# volumes « siral_* ». Le conteneur updater le force explicitement (-p siral)
# pour rester cohérent quel que soit son répertoire de travail.

services:
  siral:
    build: .
    restart: unless-stopped
    environment:
      - SIRAL_SETUP_CODE=${SIRAL_SETUP_CODE}
      - SIRAL_SECRET=${SIRAL_SECRET}
      - SIRAL_RP_ID=${SIRAL_DOMAINE}
      - SIRAL_ORIGIN=https://${SIRAL_DOMAINE}
      - SIRAL_UPDATER_DIR=/updater
      # Attaché de justice IA (laisser vide pour désactiver totalement)
      - SIRAL_ATTACHE_URL=${SIRAL_ATTACHE_URL:-}
      - SIRAL_ATTACHE_TJ=${SIRAL_ATTACHE_TJ:-default}
    volumes:
      - siral-data:/data
      - updater-state:/updater
    expose:
      - "3000"

  # ── Attaché de justice IA (optionnel — voir docs/ATTACHE.md) ──
  # Seul détenteur de la clé-maître et des clés remises ; jamais exposé sur
  # Internet (réseau docker interne). Inactif tant que SIRAL_ATTACHE_URL est
  # vide côté app. Le CLI Claude Code s'authentifie avec l'ABONNEMENT :
  #   docker compose exec -it attache claude   (une fois, état persistant)
  attache:
    build:
      context: .
      dockerfile: Dockerfile.attache
    restart: unless-stopped
    environment:
      - SIRAL_SECRET=${SIRAL_SECRET}
      - SIRAL_ATTACHE_MASTER_KEY=${SIRAL_ATTACHE_MASTER_KEY:-}
      - SIRAL_ATTACHE_TJ=${SIRAL_ATTACHE_TJ:-default}
      - SIRAL_ATTACHE_CONTENTIEUX=${SIRAL_ATTACHE_CONTENTIEUX:-crimorg}
      - SIRAL_ATTACHE_OWNER_EMAIL=${SIRAL_ATTACHE_OWNER_EMAIL:-}
      - SIRAL_ATTACHE_IMAP_HOST=${SIRAL_ATTACHE_IMAP_HOST:-}
      - SIRAL_ATTACHE_IMAP_PORT=${SIRAL_ATTACHE_IMAP_PORT:-993}
      - SIRAL_ATTACHE_IMAP_USER=${SIRAL_ATTACHE_IMAP_USER:-}
      - SIRAL_ATTACHE_IMAP_PASSWORD=${SIRAL_ATTACHE_IMAP_PASSWORD:-}
      - SIRAL_ATTACHE_SMTP_HOST=${SIRAL_ATTACHE_SMTP_HOST:-}
      - SIRAL_ATTACHE_SMTP_PORT=${SIRAL_ATTACHE_SMTP_PORT:-465}
      - SIRAL_ATTACHE_SMTP_USER=${SIRAL_ATTACHE_SMTP_USER:-}
      - SIRAL_ATTACHE_SMTP_PASSWORD=${SIRAL_ATTACHE_SMTP_PASSWORD:-}
      - SIRAL_ATTACHE_FROM=${SIRAL_ATTACHE_FROM:-}
      - SIRAL_ATTACHE_POLL_MIN=${SIRAL_ATTACHE_POLL_MIN:-5}
      - SIRAL_ATTACHE_MODEL=${SIRAL_ATTACHE_MODEL:-}
    volumes:
      - siral-data:/data
      - claude-auth:/home/attache
    expose:
      - "8787"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SIRAL_DOMAINE=${SIRAL_DOMAINE}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # Mises à jour depuis l'app (Paramètres → Mise à jour) : seul ce conteneur
  # touche au dépôt git et au démon Docker. L'app lui parle par fichiers via
  # le volume updater-state — voir scripts/updater.sh.
  updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    restart: unless-stopped
    environment:
      - REPO_DIR=/srv/repo
      - STATE_DIR=/state
      - COMPOSE_PROJECT_NAME=siral
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/srv/repo
      - updater-state:/state

volumes:
  siral-data:
  caddy-data:
  caddy-config:
  updater-state:
  claude-auth:
