# SIRAL — déploiement serveur (app + HTTPS automatique)
#
#  1. copiez .env.exemple vers .env et remplissez les valeurs
#  2. docker compose up -d --build
#
services:
  siral:
    build: .
    restart: unless-stopped
    environment:
      - SIRAL_SETUP_CODE=${SIRAL_SETUP_CODE}
      - SIRAL_SECRET=${SIRAL_SECRET}
      - SIRAL_RP_ID=${SIRAL_DOMAINE}
      - SIRAL_ORIGIN=https://${SIRAL_DOMAINE}
    volumes:
      - siral-data:/data
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SIRAL_DOMAINE=${SIRAL_DOMAINE}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  siral-data:
  caddy-data:
  caddy-config:
